[profile.default]
src = "src"
out = "out"
test = "test"
libs = ["lib"]
# Pinned so builds are deterministic. Bump deliberately, never from memory.
solc_version = "0.8.28"
# Conservative target that Monad supports. Confirm against Monad docs before mainnet.
# sourceRef: https://docs.monad.xyz (EVM compatibility)
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
# IR pipeline: needed for the multi-argument verify path (avoids stack-too-deep)
# and produces standard EVM bytecode.
via_ir = true
# No filesystem or external-process access from tests.
ffi = false

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
